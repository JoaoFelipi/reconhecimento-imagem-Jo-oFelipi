<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #00f5a0;
      --accent2: #00c8f5;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --danger: #ff4d6d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 2rem 1.5rem 1rem;
      text-align: center;
    }

    .badge-label {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,245,160,0.3);
      padding: 0.25rem 0.75rem;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* Main card */
    .main-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,245,160,0.05), 0 20px 60px rgba(0,0,0,0.4);
      transition: box-shadow 0.3s;
    }

    .main-card:hover {
      box-shadow: 0 0 60px rgba(0,245,160,0.08), 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Webcam section */
    .webcam-section {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      position: relative;
    }

    #webcam-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #webcam-container canvas {
      border-radius: 10px;
      border: 2px solid var(--border);
      box-shadow: 0 0 30px rgba(0,245,160,0.1);
      max-width: 100%;
      height: auto;
    }

    /* Placeholder */
    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
    }

    .cam-placeholder .cam-icon {
      width: 64px;
      height: 64px;
      border: 2px dashed var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      opacity: 0.5;
    }

    .cam-placeholder p {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-align: center;
      line-height: 1.6;
    }

    /* Status badge */
    .status-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      transition: all 0.3s;
    }

    .status-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-badge.active {
      color: var(--accent);
      border-color: rgba(0,245,160,0.3);
    }

    .status-badge.active .dot {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Labels section */
    .labels-section {
      padding: 1.5rem;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #label-container {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .prediction-item {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .prediction-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .class-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .class-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 700;
      min-width: 48px;
      text-align: right;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.2s ease;
      box-shadow: 0 0 8px rgba(0,245,160,0.4);
      width: 0%;
    }

    /* Top prediction highlight */
    .prediction-item.top-class .class-name {
      color: var(--accent);
    }

    .prediction-item.top-class .progress-fill {
      background: linear-gradient(90deg, var(--accent), #00ffcc);
      box-shadow: 0 0 12px rgba(0,245,160,0.6);
    }

    /* Empty state for labels */
    .labels-empty {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      padding: 1rem 0;
    }

    /* Button */
    .btn-start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(0,245,160,0.25);
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .btn-start::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s;
    }

    .btn-start:hover::before { left: 100%; }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,245,160,0.4);
    }

    .btn-start:active { transform: translateY(0); }

    .btn-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Camera icon SVG */
    .icon-camera {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Loading spinner inside btn */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-start.loading .spinner { display: block; }
    .btn-start.loading .icon-camera { display: none; }
    .btn-start.loading .btn-text { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header>
      <div class="badge-label">&#9679; Vision AI</div>
      <h1>Teachable Machine</h1>
      <p class="subtitle">// image classification model</p>
    </header>

    <main class="container" style="max-width: 520px; padding-bottom: 2rem;">
      <div class="main-card">

        <!-- Webcam -->
        <div class="webcam-section">
          <div class="status-badge" id="status-badge">
            <span class="dot"></span>
            <span id="status-text">offline</span>
          </div>

          <div id="webcam-container">
            <div class="cam-placeholder" id="cam-placeholder">
              <div class="cam-icon">&#9654;</div>
              <p>Clique em "Ativar Câmera"<br/>para iniciar o modelo</p>
            </div>
          </div>
        </div>

        <!-- Labels -->
        <div class="labels-section">
          <div class="section-title">Predições</div>
          <div id="label-container">
            <div class="labels-empty" id="labels-empty">Aguardando inicialização...</div>
          </div>
        </div>

        <!-- Button -->
        <div style="padding: 0 1.5rem 1.5rem;">
          <button class="btn-start" id="start-btn" onclick="init()">
            <span class="spinner" id="btn-spinner"></span>
            <svg class="icon-camera" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/>
              <path d="M20 6h-2.18c-.09-.31-.27-.6-.5-.83L16 4h-8l-1.32 1.17c-.23.23-.41.52-.5.83H4C2.9 6 2 6.9 2 8v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2Zm-8 11a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"/>
            </svg>
            <span class="btn-text">Ativar Câmera</span>
          </button>
        </div>
      </div>
    </main>

    <footer>
      Powered by <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a>
      &nbsp;&amp;&nbsp;
      <a href="https://www.tensorflow.org/js" target="_blank">TensorFlow.js</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/x9pR9b-pt/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.classList.add('loading');
      document.querySelector('.btn-text').textContent = 'Carregando...';

      try {
        const modelURL    = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model          = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(280, 280, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        // Remove placeholder, append canvas
        document.getElementById('cam-placeholder').remove();
        document.getElementById('webcam-container').appendChild(webcam.canvas);

        // Update status
        const badge = document.getElementById('status-badge');
        badge.classList.add('active');
        document.getElementById('status-text').textContent = 'ao vivo';

        // Build prediction items
        labelContainer = document.getElementById('label-container');
        labelContainer.innerHTML = '';

        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement('div');
          item.classList.add('prediction-item');
          item.id = 'item-' + i;
          item.innerHTML = `
            <div class="prediction-header">
              <span class="class-name" id="name-${i}">Classe ${i + 1}</span>
              <span class="class-value" id="val-${i}">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="bar-${i}"></div>
            </div>`;
          labelContainer.appendChild(item);
        }

        // Hide button
        btn.style.display = 'none';

      } catch(e) {
        btn.disabled = false;
        btn.classList.remove('loading');
        document.querySelector('.btn-text').textContent = 'Ativar Câmera';
        alert('Erro ao iniciar: ' + e.message);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      // Find top class index
      let topIdx = 0;
      let topProb = 0;
      for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > topProb) {
          topProb = prediction[i].probability;
          topIdx  = i;
        }
      }

      for (let i = 0; i < maxPredictions; i++) {
        const prob    = prediction[i].probability;
        const pct     = (prob * 100).toFixed(1);
        const nameEl  = document.getElementById('name-' + i);
        const valEl   = document.getElementById('val-'  + i);
        const barEl   = document.getElementById('bar-'  + i);
        const itemEl  = document.getElementById('item-' + i);

        if (nameEl) nameEl.textContent = prediction[i].className;
        if (valEl)  valEl.textContent  = pct + '%';
        if (barEl)  barEl.style.width  = pct + '%';

        if (itemEl) {
          if (i === topIdx && topProb > 0.5) {
            itemEl.classList.add('top-class');
          } else {
            itemEl.classList.remove('top-class');
          }
        }
      }
    }
  </script>
</body>
</html>
